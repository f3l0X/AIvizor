name: Backend tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies (without LLM SDKs)
        # google-genai / anthropic no son necesarios para los tests:
        # MockProvider no toca esos imports y los providers reales
        # solo importan el SDK dentro del constructor (ver llm/{gemini,claude}.py).
        # Mantenerlo así abarata el CI y deja la suite por debajo de 30s.
        run: |
          python -m pip install --upgrade pip
          pip install \
            'fastapi>=0.115.0' \
            'pydantic>=2.9.0' \
            'pydantic-settings>=2.5.0' \
            'sqlalchemy>=2.0.35' \
            'httpx>=0.27.2' \
            'pytest>=8.3.3' \
            'pytest-asyncio>=0.24.0'

      - name: Run pytest
        run: pytest -v --tb=short
